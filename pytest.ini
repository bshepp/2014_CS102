[pytest]
# Simplified pytest configuration for CI/CD testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    mathematical: Mathematical accuracy tests
    api: API endpoint tests
    tiling: Tiling functionality tests
    mcp: MCP server integration tests
    slow: Slow-running tests (> 1 second)
    requires_java: Tests requiring Java installation
    benchmark: Benchmark tests

# Output options
addopts = -v --tb=short --color=yes

# Asyncio settings
asyncio_mode = auto

# Ignored paths during test collection
norecursedirs = 
    .git
    .tox
    .env
    venv
    .venv
    .mypy_cache
    .pytest_cache
    .archive
    htmlcov
    build
    dist
    *.egg-info